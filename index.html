<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dia das Mães</title>

</head>

<body>

    <div id="tela-entrada" class="container">
        <header>
            <h1>Presente Especial 🌸</h1>
            <p>Crie um cartão único para sua mãe em segundos.</p>
        </header>

        <main>
            <form id="cardForm">
                <div class="input-group">
                    <label for="nomeMae">Nome da Mãe</label>
                    <input type="text" id="nomeMae" placeholder="Ex: Maria Silva" required>
                </div>

                <div class="input-group">
                    <label for="estilo">O que ela mais gosta?</label>
                    <select id="estilo">
                        <option value="" disabled selected>Escolha o estilo dela...</option>
                        <option value="flores">Flores e Jardim</option>
                        <option value="cafe">Café e Livros</option>
                        <option value="cozinhar">Cozinhar em Família</option>
                        <option value="viagem">Viajar e Aventuras</option>
                        <option value="musica">Ouvir Música e Dançar</option>
                        <option value="filmes">Cinema e Séries</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="fotoUpload">Escolha uma foto da sua mãe:</label>
                    <input type="file" id="fotoUpload" accept="image/*">
                </div>

                <div class="input-group">
                    <span class="mensagem">Tom da Mensagem</span>
                    <div class="radio-group">
                        <label><input type="radio" name="tom" value="emocionante" checked> Emocionante</label>
                        <label><input type="radio" name="tom" value="engracado"> Engraçado</label>
                        <label><input type="radio" name="tom" value="Poetico"> Poético</label>
                    </div>
                </div>

                <button type="submit" class="btn-gerar">Gerar Cartão com IA</button>
            </form>
        </main>
    </div>

    <section id="resultado" class="hidden">
        <div class="cartao-gerado">
            <img id="fotoExibida" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                alt="Imagem do cartão">
            <div class="texto-cartao">
                <h2 id="tituloCartao">Para você, Mãe</h2>
                <p id="poemaGerado"></p>
            </div>
        </div>

        <div class="acoes-resultado">
            <button id="btnWhatsapp" class="btn-compartilhar zap">Compartilhar no WhatsApp</button>
            <button onclick="location.reload()" class="btn-voltar">Criar outro</button>
        </div>

        <div class="apoio-secao">
            <button id="btnApoiar" class="btn-apoio">☕ Pague um café</button>
        </div>

        <div id="modalPix" class="modal hidden">
            <div class="modal-conteudo">
                <h3>Gostou do cartão? 🌸</h3>
                <p>Contribua para manter o projeto online!</p>
                <div class="pix-box">
                    <strong>Chave PIX:</strong> <br>
                    <span>162f0a82-8e3c-41a5-88d1-961cd8d890a6</span>
                </div>
                <button onclick="fecharModal()" class="btn-fechar">Fechar</button>
            </div>
        </div>
    </section>


    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai@0.11.4"
      }
    }
    </script>
    <script type="module" src="script.js"></script>
</body>

</html>
